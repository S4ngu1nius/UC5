<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./img/js.png">
    <link rel="stylesheet" href="./css/estilos.css">
    <title>Contas do Mês JS</title>
</head>
<body>
    <img src="./img/contas.jpg" alt="Contas a pagar" class="alta">

    <h1>Programa Contas do Mês</h1>
    <form>
        <p>Descrição da Conta:
            <input type="text" id="inDescricao" required>
        </p>
        <p>Valor a Pagar R$:
            <input type="number" id="inValor" min="0" step="0.01" required>
        </p>
        <input type="submit" value="Registrar Conta">
    </form>

    <pre id="outResp1"></pre>
    <pre id="outResp2"></pre>

    <script src="./js/contasDoMes.js"></script>

</body>
</html>
