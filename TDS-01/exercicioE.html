<!--E - Elaborar um programa que leia um número. Calcule e informe os seus vizinhos, 
   ou seja, o número anterior e posterior.
   Exemplo:
   Número: 15
   Vizinhos 14 e 16
   Nomeie o arquivo como exercicioE.html-->

   <script>
      const valor = Number(prompt("Qual é o número?"));
      alert (`O número é: ${valor}, e seu valor anterior é: ${valor - 1} e seu valor posterior é: ${valor + 1}`);
   </script>
