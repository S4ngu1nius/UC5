<!--C - Elaborar um programa que leia o valor de um jantar. Calcule e informe o valor da taxa
   do garçom (10%) e o valor total a ser pago.
        Exemplo de entrada e saída:
	    Valor do jantar: R$ 80.00
	    Taxa do Garcom: R$ 8.00
	    Total a Pagar: R$ 88.00
   Nomeie o arquivo como exercicioC.html-->

<meta charset="UTF-8">
<script>
    const valor_jantar = Number(prompt("Valor do jantarem R$: "));
    const taxa_garcom = valor_jantar * 0.1;
    const total_pagar = Number(valor_jantar) + Number(taxa_garcom);
    alert(`O total do jantar foi ${valor_jantar}. Mas com a taxa do gaçom, fica um total de ${total_pagar}`);
</script>
