<!--H - Elaborar um programa que leia 2 notas de um aluno em uma disciplina. Calcule e informe
   a média das notas.
   Exemplo:
   1º Nota: 7.0
   2º Nota: 8.0
   Média: 7.5
   Nomeie o arquivo como exercicioH.html-->

   <script>
    const nota1 = Number(prompt("Digite a primeira nota:"));
    const nota2 = Number(prompt("Digite a segunda nota:"));
    const media = (nota1 + nota2) / 2;
    alert(`A primeira nota do aluno foi: ${nota1}. Já a segunda foi ${nota2}. E sua média foi: ${media}`);
   </script>
