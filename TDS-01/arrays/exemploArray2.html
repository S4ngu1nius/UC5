<script>

    const letras = ["A", "B", "C", "D"];    //Declara e define conteudo inicial do array
    const letras2 = letras.slice(-2);       //obtem 2 ultimas letras
    const letras3 = letras.slice(0, -1);    //obtem do inicio ate o final, exeto a ultima

    console.log(letras);                    //["A", "B", "C", "D"]
    console.log(letras2);                   //["C", "D"]
    console.log(letras3);                   //["A", "B", "C"]

    const retira = letras.splice(2, 1);     //remove a partir da posição 2, 1 elemento
    console.log(letras);                    //["A", "B", "D"]
    console.log(retira);

</script>
