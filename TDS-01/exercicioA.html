<!--A - Elaborar um programa que leia um número. Calcule e informe o dobro desse número.
    - Entrada de dados: ler um número
    - Processamento: calcule o dobro
    - Saída: informar o dobro
    Nomeie o arquivo como exercicioA.html-->
<meta charset="UTF-8">
<script>
    const num = prompt("Número: "); // lê um dado de entrada
    const dobro = num * 2; //calculo do dobro do número
    alert(`O dobro de ${num} é ${dobro}`); //exibe o resultado
</script>
