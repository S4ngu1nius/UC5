<!--D - Elaborar um programa que leia a duração de uma viagem em dias e horas. Calcule e 
   informe a duração total da viagem em número de horas.
	Exemplo de dados de entrada e saída para viagem que durou 2 dias + 5 horas:
	    Nº Dias: 2
	    Nº Horas: 5
	    Total de Horas: 53
   Nomeie o arquivo como exercicioD.html-->

   <script>
		const dias = Number(prompt("Número de dias: "));
		const horas = Number(prompt("Número de horas: "));

		const total = (dias * 24) + horas;

		alert(`Total de horas: ${total}`);
   </script>
