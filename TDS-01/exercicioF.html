<!--F - Elaborar um programa para uma pizzaria, o qual leia o valor total de uma conta e
   quantos clientes vão pagá-la. Calcule e informe o valor a ser pago por cliente.
   Exemplo:
   Valor da Conta: R$ 90.00
   Número de Clientes: 3
   Valor por cliente: R$ 30.00
   Nomeie o arquivo como exercicioF.html-->

   <script>
    const valorConta = Number(prompt("Valor da conta: "));
    const qtdClientes = Number(prompt("Quantidade de cliente: "));
    const vlClientes = valorConta/qtdClientes;
    alert(`O total da conta da mesa é: ${valorConta}. Mas o valor por cliente é: ${vlClientes}`);
   </script>
