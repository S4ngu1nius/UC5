<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./img/js.png">
    <link rel="stylesheet" href="./css/pesoIdeal.css">
    <title>Calculadora Peso Ideal JS</title>
</head>
<body>
    <img src="./img/pesoideal.jpg" alt="Balança de Peso">
    <h1>Programa Calculadora Peso Ideal JS</h1>
    <form>
        <p>Nome:
            <input type="text" id="inNome" required>
        </p>
        <p>Sexo:
            <input type="radio" name="sexo" id="inMasculino" required> Masculino
            <input type="radio" name="sexo" id="inFeminino" required> Feminino
        </p>
        <p>Altura:
            <input type="number" min="0" step="0.01" id="inAltura" required>
        </p>
        <input type="submit" value="Calcular Peso Ideal">
        <input type="reset" value="Limpar Campos">
    </form>
</body>
    <h3></h3>
    <script src="./js/pesoIdeal.js"></script>
</html>
