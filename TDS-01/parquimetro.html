<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parquímetro</title>
  <link rel="stylesheet" href="css/stylus.css">
</head>
<body>
  <div class="container">
    <h1>Simulador de Parquímetro JS</h1>
    <label for="valor">Valor depositado (R$):</label>
    <input type="number" id="valor" step="0.01" min="0"/>
    <button id="btnCalcular">Calcular Tempo</button>
    <div id="resultado">Informe um valor e clique em calcular.</div>
  </div>
  <script src="./js/parquimetro.js"></script>
</body>
</html>
