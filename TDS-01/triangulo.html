<!DOCTYPE html>
<html lang="pt-br">
<!--d)Elaborar um programa que leia três lados e verifique se eles podem formar ou não
um triangulo. Para formar um triangulo, um dos lados não pode ser maior que a soma
dos outros dois.
Caso possam formar um triangulo, exiba também qual o tipo do triangulo:
Equilátero (3 lados iguais), Isósceles (2 lados iguais) e Escaleno (3 lados diferentes)-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/stylus.css">
  <title>Triângulo</title>
</head>

<body>
  <img src="img/exerc.jpg" alt="Exercícios">
  <h1>Programa Lados de um Triângulo</h1>
  <form>
    <p>Lado A:
      <input type="number" id="inLadoA" min="1" required>
    </p>
    <p>Lado B:
      <input type="number" id="inLadoB" min="1" required>
    </p>
    <p>Lado C:
      <input type="number" id="inLadoC" min="1" required>
    </p>
    <p>
      <input type="submit" value="Verificar Lados">
    </p>
  </form>
  <h3 id="outSimNao"></h3>
  <h3 id="outTipo"></h3>
  <script src="./js/triangulo.js"></script>
</body>

</html>
