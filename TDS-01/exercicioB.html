<!--B - Elaborar um programa que leia dois números. Calcule e informe a soma desses números.
    - Entrada de dados: ler dois números
    - Processamento: calcular a soma
    - Saída: informar a soma
    Nomeie o arquivo como exercicioB.html-->
<meta charset="UTF-8">
    <script>
        const num1 = prompt("Número: ");
        const num2 = prompt("Número: ");
        const soma = Number(num1) + Number(num2);
        alert(`A soma do número ${num1} e do número ${num2} é igual a ${soma}`);
    </script>
